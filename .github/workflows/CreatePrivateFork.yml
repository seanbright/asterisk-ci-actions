name: CreatePrivateFork
run-name: "CreatePrivateFork asterisk/${{ inputs.dst_repo }}"
on:
  workflow_dispatch:
    inputs:
      src_repo:
        description: 'Source repo in asterisk org:'
        required: true
        type: string
      dst_repo:
        description: 'Destination repo in asterisk org:'
        required: true
        type: string

env:
  GITHUB_TOKEN:     ${{ secrets.ASTERISKTEAM_PAT }}
  SRC_REPO:         ${{ inputs.src_repo }}
  DST_REPO:         ${{ inputs.dst_repo }}

jobs:
  CreatePrivateFork:
    runs-on: ubuntu-latest
    steps:
        # ACTIONS_PATH, SCRIPT_DIR, NORMALIZED_BRANCH env vars
      - name: GetActionsRepo
        uses: asterisk/asterisk-ci-actions/GetActionsRepo@main
    
      - name: CreateFork
        run: |
          fix_branches=$(gh -R asterisk/${SRC_REPO} variable get SECURITY_FIX_BRANCHES | sed -n -r -e 's/("|\[|\])//gp')
          echo "Security fix branches: ${fix_branches}"
          ${SCRIPT_DIR}/SecurityAdvisoryTools/createPrivateFork.sh \
            --src-repo=${SRC_REPO} \
            --dst-repo=${DST_REPO} \
            --security-fix-branches=${fix_branches}

      - name: CopyVars
        uses: asterisk/asterisk-ci-actions/CopyRepoVariables@main
        with:
          src_repo:        ${{ inputs.src_repo }}
          dst_repo:        ${{ inputs.dst_repo }}
          github_token:    ${{ secrets.ASTERISKTEAM_PAT }}


